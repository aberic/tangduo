#公共配置
spring:
  security: # Actuator 安全登录账号
    user:
      name: tangduo
      password: tangduo
      roles: ACTUATOR
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      enabled: true
      max-file-size: 3MB # 单个上传文件的最大值 这是tomcat容器限制 代码中的判断比这个阈值更小
      max-request-size: 10MB # 上传文件总的最大值
  profiles:
    active: dev
  application:
    name: TangDuoSearch

logging:
  file:
    path: ${LOG_PATH:search/tmp/log}

server:
  port: ${PORT:19219}
management:
  # Actuator 独立端口，不占用业务端口
  server:
    port: 19220
  endpoints:
    web:
      # 暴露常用监控端点
      exposure:
        include: health,info,metrics,beans,mappings,loggers,threaddump
      # 访问路径 /actuator/xxx
      base-path: /actuator
  endpoint:
    health:
      # 显示完整健康信息
      show-details: always
    # 关闭危险端点
    shutdown:
      enabled: false

custom:
  db:
    DB_ROOT_PATH: ${DB_ROOT_PATH:search/tmp/data} # 数据库根路径
    DB_DATA_FILE_MAX_SIZE: ${DB_DATA_FILE_MAX_SIZE:1073741824} # 数据文件大小阈值，单位byte
    DB_SEARCH_MAX_COUNT: ${DB_SEARCH_MAX_COUNT:10000} # 每条索引检索的最大数据量
  index:
    INDEX_BATCH_MAX_SIZE: ${INDEX_BATCH_MAX_SIZE:5000} # 单批次最大数量


---
#开发环境配置
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    root: ${LOG_LEVEL:DEBUG}
---
#测试环境配置
spring:
  config:
    activate:
      on-profile: test
logging:
  level:
    root: ${LOG_LEVEL:DEBUG}
---
#生产环境配置
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    root: ${LOG_LEVEL:INFO}